services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: restaurant_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: restaurant
      RABBITMQ_DEFAULT_PASS: restaurant

  mongodb:
    image: mongo:8
    container_name: restaurant_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: restaurant
      MONGO_INITDB_ROOT_PASSWORD: restaurant      